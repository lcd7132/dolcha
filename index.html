<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>후쿠오카 여행 실전 일본어 가이드</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg: #0c1220;
    --bg2: #111a2e;
    --card: #162036;
    --card-hover: #1c2a45;
    --border: #243050;
    --accent: #e8505b;
    --accent2: #ff7a85;
    --gold: #f0c040;
    --jp: #7ec8e3;
    --pron: #c9a0dc;
    --kr: #e0e0e0;
    --muted: #6b7fa3;
    --tag-bg: rgba(232,80,91,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--kr);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .jp-font { font-family: 'Zen Maru Gothic', 'Noto Sans KR', sans-serif; }

  .bg-blobs { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:hidden; }
  .bg-blobs .blob { position:absolute; border-radius:50%; filter:blur(120px); opacity:0.12; }
  .blob-1 { width:600px; height:600px; background:var(--accent); top:-200px; right:-100px; animation:blobFloat 20s ease-in-out infinite; }
  .blob-2 { width:500px; height:500px; background:var(--jp); bottom:-150px; left:-100px; animation:blobFloat 25s ease-in-out infinite reverse; }
  .blob-3 { width:400px; height:400px; background:var(--gold); top:50%; left:50%; transform:translate(-50%,-50%); animation:blobFloat 18s ease-in-out infinite; }
  @keyframes blobFloat {
    0%,100% { transform:translate(0,0) scale(1); }
    33% { transform:translate(30px,-30px) scale(1.05); }
    66% { transform:translate(-20px,20px) scale(0.95); }
  }

  .sakura-container { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1; overflow:hidden; }
  .sakura {
    position:absolute; top:-30px;
    width:12px; height:12px;
    background:radial-gradient(ellipse at center, rgba(232,80,91,0.6) 0%, rgba(255,122,133,0.2) 100%);
    border-radius:50% 0 50% 0;
    animation:sakuraFall linear infinite;
    opacity:0;
  }
  @keyframes sakuraFall {
    0% { opacity:0; transform:translateX(0) rotate(0deg); }
    10% { opacity:0.7; }
    90% { opacity:0.5; }
    100% { opacity:0; transform:translateX(200px) rotate(720deg); top:110vh; }
  }

  .content-wrap { position:relative; z-index:2; }

  .hero { position:relative; padding:80px 20px 60px; text-align:center; overflow:hidden; }
  .hero::before { content:''; position:absolute; top:0; left:0; right:0; bottom:0; background:linear-gradient(180deg, rgba(232,80,91,0.06) 0%, transparent 100%); pointer-events:none; }
  .hero-title {
    font-size:clamp(2rem,5vw,3.5rem); font-weight:900; line-height:1.2; margin-bottom:12px;
    background:linear-gradient(135deg, #fff 0%, var(--accent2) 50%, var(--gold) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .hero-sub { font-size:clamp(0.95rem,2vw,1.15rem); color:var(--muted); font-weight:300; letter-spacing:0.5px; }
  .hero-badge {
    display:inline-flex; align-items:center; gap:8px;
    background:var(--tag-bg); border:1px solid rgba(232,80,91,0.3);
    border-radius:100px; padding:8px 20px; margin-top:24px;
    font-size:0.85rem; color:var(--accent2);
  }

  .search-wrap { max-width:560px; margin:0 auto 40px; position:relative; }
  .search-wrap input {
    width:100%; padding:16px 20px 16px 52px;
    background:var(--card); border:1px solid var(--border);
    border-radius:16px; color:var(--kr); font-size:1rem;
    outline:none; transition:all 0.3s;
    font-family:'Noto Sans KR', sans-serif;
  }
  .search-wrap input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(232,80,91,0.15); }
  .search-wrap input::placeholder { color:var(--muted); }
  .search-wrap .search-icon { position:absolute; left:18px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:1.1rem; }
  .search-count { text-align:center; color:var(--muted); font-size:0.85rem; margin-top:10px; min-height:20px; }

  .cat-tabs { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; padding:0 20px; margin-bottom:40px; max-width:900px; margin-left:auto; margin-right:auto; }
  .cat-tab {
    padding:10px 20px; border-radius:12px;
    background:var(--card); border:1px solid var(--border);
    color:var(--muted); cursor:pointer; font-size:0.9rem;
    font-weight:500; transition:all 0.3s; user-select:none;
    display:flex; align-items:center; gap:8px;
  }
  .cat-tab:hover { background:var(--card-hover); color:var(--kr); border-color:rgba(232,80,91,0.3); }
  .cat-tab.active {
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    color:#fff; border-color:transparent;
    box-shadow:0 4px 20px rgba(232,80,91,0.3);
  }
  .cat-tab .tab-icon { font-size:1rem; }

  .phrase-section { max-width:1100px; margin:0 auto; padding:0 20px 60px; display:none; }
  .phrase-section.active { display:block; }

  .section-header { display:flex; align-items:center; gap:16px; margin-bottom:28px; padding-bottom:16px; border-bottom:1px solid var(--border); }
  .section-icon {
    width:52px; height:52px; border-radius:16px;
    display:flex; align-items:center; justify-content:center;
    font-size:1.5rem; color:#fff;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow:0 4px 16px rgba(232,80,91,0.25);
  }
  .section-title { font-size:1.5rem; font-weight:700; color:#fff; }
  .section-count { font-size:0.85rem; color:var(--muted); margin-left:auto; }

  .phrase-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:14px; }
  .phrase-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:14px; padding:18px 20px;
    cursor:pointer; transition:all 0.3s; position:relative;
    overflow:hidden;
  }
  .phrase-card::before { content:''; position:absolute; top:0; left:0; width:4px; height:100%; background:var(--accent); opacity:0; transition:opacity 0.3s; }
  .phrase-card:hover {
    background:var(--card-hover); border-color:rgba(232,80,91,0.3);
    transform:translateY(-2px);
    box-shadow:0 8px 30px rgba(0,0,0,0.3);
  }
  .phrase-card:hover::before { opacity:1; }
  .phrase-card .card-num { position:absolute; top:10px; right:14px; font-size:0.7rem; color:var(--muted); opacity:0.5; }

  .phrase-card .jp-text {
    font-family:'Zen Maru Gothic','Noto Sans KR',sans-serif;
    font-size:1.08rem; color:var(--jp); font-weight:700;
    margin-bottom:3px; line-height:1.5;
  }
  .phrase-card .pron-text {
    font-size:0.85rem; color:var(--pron); margin-bottom:8px;
    font-weight:500; letter-spacing:0.3px;
  }
  .phrase-card .kr-text { font-size:0.92rem; color:var(--kr); line-height:1.5; opacity:0.85; }
  .phrase-card .copy-btn {
    position:absolute; bottom:12px; right:14px;
    width:30px; height:30px; border-radius:8px;
    background:transparent; border:1px solid var(--border);
    color:var(--muted); cursor:pointer; font-size:0.75rem;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.2s; opacity:0;
  }
  .phrase-card:hover .copy-btn { opacity:1; }
  .phrase-card .copy-btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }

  .toast {
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(100px);
    background:var(--card); border:1px solid var(--accent);
    color:#fff; padding:14px 28px; border-radius:14px;
    font-size:0.9rem; z-index:999; pointer-events:none;
    transition:transform 0.4s cubic-bezier(0.16,1,0.3,1), opacity 0.4s;
    opacity:0; box-shadow:0 8px 30px rgba(0,0,0,0.4);
    display:flex; align-items:center; gap:10px;
  }
  .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

  .scroll-top {
    position:fixed; bottom:30px; right:30px; z-index:100;
    width:48px; height:48px; border-radius:14px;
    background:var(--accent); color:#fff; border:none;
    cursor:pointer; font-size:1.1rem;
    display:flex; align-items:center; justify-content:center;
    opacity:0; transform:translateY(20px);
    transition:all 0.3s; box-shadow:0 4px 20px rgba(232,80,91,0.4);
  }
  .scroll-top.visible { opacity:1; transform:translateY(0); }
  .scroll-top:hover { transform:translateY(-3px); }

  footer { text-align:center; padding:40px 20px; border-top:1px solid var(--border); color:var(--muted); font-size:0.85rem; }
  footer .footer-tip { max-width:600px; margin:0 auto 16px; background:var(--card); border-radius:14px; padding:20px 24px; text-align:left; border:1px solid var(--border); }
  footer .footer-tip strong { color:var(--accent2); }

  .stats-bar { display:flex; justify-content:center; gap:40px; padding:20px; margin:0 auto 10px; max-width:700px; flex-wrap:wrap; }
  .stat-item { text-align:center; }
  .stat-num {
    font-size:2rem; font-weight:900;
    background:linear-gradient(135deg, var(--accent2), var(--gold));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .stat-label { font-size:0.8rem; color:var(--muted); margin-top:2px; }

  .legend { display:flex; justify-content:center; gap:24px; margin-bottom:30px; flex-wrap:wrap; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:0.82rem; color:var(--muted); }
  .legend-dot { width:10px; height:10px; border-radius:3px; }

  @media (max-width:640px) {
    .phrase-grid { grid-template-columns:1fr; }
    .cat-tab { padding:8px 14px; font-size:0.82rem; }
    .hero { padding:60px 16px 40px; }
    .stats-bar { gap:24px; }
    .stat-num { font-size:1.5rem; }
  }
  .phrase-card { animation:cardIn 0.4s ease both; }
  @keyframes cardIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .highlight { background:rgba(232,80,91,0.25); border-radius:3px; padding:0 2px; }

  @media (prefers-reduced-motion: reduce) {
    .sakura, .blob { animation: none !important; }
    .phrase-card { animation: none !important; }
  }
</style>
</head>
<body>

<div class="bg-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>
<div class="sakura-container" id="sakuraContainer"></div>

<div class="content-wrap">
  <header class="hero">
    <div class="hero-title">후쿠오카 여행 실전 일본어</div>
    <p class="hero-sub">상황별로 바로 쓸 수 있는 표현을 한눈에 정리했습니다</p>
    <div class="hero-badge">
      <i class="fas fa-map-marker-alt"></i>
      FUKUOKA, JAPAN
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">총 표현 수</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">10</div>
      <div class="stat-label">상황 카테고리</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">200+</div>
      <div class="stat-label">여행 필수 문장</div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--jp)"></div>일본어 원문</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--pron)"></div>한국어 발음</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--kr)"></div>한국어 뜻</div>
  </div>

  <div class="search-wrap">
    <i class="fas fa-search search-icon"></i>
    <input type="text" id="searchInput" placeholder="일본어, 발음 또는 한국어로 검색...">
  </div>
  <div class="search-count" id="searchCount"></div>

  <nav class="cat-tabs" id="catTabs"></nav>
  <main id="phraseSections"></main>

  <footer>
    <div class="footer-tip">
      <strong><i class="fas fa-lightbulb"></i> 꿀팁:</strong> 카드를 클릭하면 일본어 문장이 클립보드에 복사됩니다. 현지에서 급할 때 상대방에게 보여주기만 해도 의사소통이 가능합니다!
    </div>
    <p>후쿠오카 여행 실전 일본어 가이드 &middot; 안전하고 즐거운 여행 되세요</p>
  </footer>
</div>

<div class="toast" id="toast">
  <i class="fas fa-check-circle" style="color:var(--accent)"></i>
  <span id="toastMsg">복사되었습니다</span>
</div>

<button class="scroll-top" id="scrollTopBtn" aria-label="맨 위로">
  <i class="fas fa-chevron-up"></i>
</button>

<script>
const categories = [
  {
    id:'airport', name:'공항·입국', icon:'fa-plane-arrival',
    phrases:[
      {jp:'すみません、入国カードはどこでもらえますか？', pron:'스미마쎈, 뉴코쿠 카도 와 도코데 모라에마스까?', kr:'실례합니다, 입국카드는 어디서 받을 수 있나요?'},
      {jp:'韓国から来ました。', pron:'칸코쿠카라 키마시타', kr:'한국에서 왔습니다.'},
      {jp:'観光目的です。', pron:'칸코 목테키 데스', kr:'관광 목적입니다.'},
      {jp:'滞在期間は4泊5日です。', pron:'타이자이 키칸와 욘하쿠 이츠카 데스', kr:'체류 기간은 4박 5일입니다.'},
      {jp:'宿泊先はホテルオークラです。', pron:'슈쿠하쿠사키와 호테루 오쿠라 데스', kr:'숙박지는 호텔 오쿠라입니다.'},
      {jp:'荷物受取所はどこですか？', pron:'니모츠 우케토리조와 도코 데스까?', kr:'수하물 수취소는 어디인가요?'},
      {jp:'荷物が見つかりません。', pron:'니모츠가 미츠카리마쎈', kr:'짐을 찾을 수 없습니다.'},
      {jp:'税関申告するものはありますか？', pron:'제이칸 신코쿠스루 모노와 아리마스까?', kr:'세관 신고할 물건이 있습니까?'},
      {jp:'申告するものはありません。', pron:'신코쿠스루 모노와 아리마쎈', kr:'신고할 물건은 없습니다.'},
      {jp:'両替所はどこですか？', pron:'료가에조와 도코 데스까?', kr:'환전소는 어디인가요?'},
      {jp:'円に両替お願いします。', pron:'엔니 료가에 오네가이 시마스', kr:'엔화로 환전 부탁합니다.'},
      {jp:'空港から博多駅までどう行けますか？', pron:'쿠코카라 하카타에키마데 도 이케마스까?', kr:'공항에서 하카타역까지 어떻게 가나요?'},
      {jp:'地下鉄の切符はどこで買えますか？', pron:'치카테츠노 킷푸와 도코데 카에마스까?', kr:'지하철 표는 어디서 살 수 있나요?'},
      {jp:'ICOCAは使えますか？', pron:'이코카와 츠카에마스까?', kr:'ICOCA 사용 가능한가요?'},
      {jp:'Wi-Fiはありますか？', pron:'와이파이와 아리마스까?', kr:'Wi-Fi 있나요?'},
      {jp:'フリーWi-Fiのパスワードを教えてください。', pron:'후리 와이파이노 파스와도오 오시에테 쿠다사이', kr:'무료 Wi-Fi 비밀번호 알려주세요.'},
      {jp:'トイレはどこですか？', pron:'토이레와 도코 데스까?', kr:'화장실이 어디인가요?'},
      {jp:'バス乗り場はどこですか？', pron:'바스 노리바와 도코 데스까?', kr:'버스 승차장은 어디인가요?'},
      {jp:'タクシー乗り場はどこですか？', pron:'타쿠시 노리바와 도코 데스까?', kr:'택시 승강장은 어디인가요?'},
      {jp:'このバスは天神に行きますか？', pron:'코노 바스와 텐진니 이키마스까?', kr:'이 버스는 텐진으로 가나요?'},
      {jp:'ポートライナーはどのホームですか？', pron:'포토 라이나와 도노 호무 데스까?', kr:'포트라이너는 몇 번 홈인가요?'},
    ]
  },
  {
    id:'hotel', name:'숙소·체크인', icon:'fa-hotel',
    phrases:[
      {jp:'チェックインお願いします。', pron:'체쿠인 오네가이 시마스', kr:'체크인 부탁합니다.'},
      {jp:'予約している〇〇です。', pron:'요야쿠 시테이루 마루마루 데스', kr:'예약한 〇〇입니다.'},
      {jp:'パスポートを見せてください。', pron:'파스포토오 미세테 쿠다사이', kr:'여권을 보여주세요.'},
      {jp:'予約確認書はこれです。', pron:'요야쿠 카쿠닌쇼와 코레 데스', kr:'예약 확인서는 이것입니다.'},
      {jp:'チェックアウトは何時ですか？', pron:'체쿠아우토와 난지 데스까?', kr:'체크아웃은 몇 시인가요?'},
      {jp:'朝食は何時からですか？', pron:'쵸쇼쿠와 난지카라 데스까?', kr:'조식은 몇 시부터인가요?'},
      {jp:'朝食は含まれていますか？', pron:'쵸쇼쿠와 후쿠마레테 이마스까?', kr:'조식이 포함되어 있나요?'},
      {jp:'Wi-Fiのパスワードを教えてください。', pron:'와이파이노 파스와도오 오시에테 쿠다사이', kr:'Wi-Fi 비밀번호 알려주세요.'},
      {jp:'部屋のWi-Fiが繋がりません。', pron:'헤야노 와이파이가 츠나가리마쎈', kr:'방 Wi-Fi가 연결이 안 됩니다.'},
      {jp:'荷物を預かってもらえますか？', pron:'니모츠오 아즈캇테 모라에마스까?', kr:'짐을 맡아주실 수 있나요?'},
      {jp:'荷物を部屋に運んでください。', pron:'니모츠오 헤야니 하콘데 쿠다사이', kr:'짐을 방으로 옮겨주세요.'},
      {jp:'タオルを追加でお願いします。', pron:'타오루오 츠이카데 오네가이 시마스', kr:'수건을 추가로 부탁합니다.'},

let currentCategory = 'airport';
let searchQuery = '';
const totalCount = categories.reduce((sum, cat) => sum + cat.phrases.length, 0);

function animateCounter(el, target) {
  let current = 0;
  const step = Math.max(1, Math.floor(target / 40));
  const timer = setInterval(() => {
    current += step;
    if (current >= target) { current = target; clearInterval(timer); }
    el.textContent = current;
  }, 30);
}

function renderTabs() {
  const container = document.getElementById('catTabs');
  container.innerHTML = categories.map(cat =>
    `<button class="cat-tab ${cat.id === currentCategory ? 'active' : ''}" data-cat="${cat.id}">
      <i class="fas ${cat.icon} tab-icon"></i>
      <span>${cat.name}</span>
    </button>`
  ).join('');
  container.querySelectorAll('.cat-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      currentCategory = tab.dataset.cat;
      searchQuery = '';
      document.getElementById('searchInput').value = '';
      document.getElementById('searchCount').textContent = '';
      renderTabs();
      renderSections();
      window.scrollTo({ top: document.getElementById('phraseSections').offsetTop - 80, behavior: 'smooth' });
    });
  });
}

function escapeAttr(str) { return str.replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

function highlightText(text, query) {
  if (!query) return text;
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0, idx) + '<span class="highlight">' + text.slice(idx, idx + query.length) + '</span>' + text.slice(idx + query.length);
}

function renderSections() {
  const container = document.getElementById('phraseSections');
  const query = searchQuery.toLowerCase();
  container.innerHTML = categories.map(cat => {
    let filtered = cat.phrases;
    if (query) {
      filtered = cat.phrases.filter(p =>
        p.jp.toLowerCase().includes(query) ||
        p.kr.toLowerCase().includes(query) ||
        p.pron.toLowerCase().includes(query)
      );
    }
    const isActive = query ? filtered.length > 0 : cat.id === currentCategory;
    if (!isActive) return '';
    return `
      <section class="phrase-section ${isActive ? 'active' : ''}" data-section="${cat.id}">
        <div class="section-header">
          <div class="section-icon"><i class="fas ${cat.icon}"></i></div>
          <h2 class="section-title">${cat.name}</h2>
          <span class="section-count">${filtered.length}개 표현</span>
        </div>
        <div class="phrase-grid">
          ${filtered.map((p, i) => `
            <div class="phrase-card" data-jp="${escapeAttr(p.jp)}" style="animation-delay:${i * 0.03}s">
              <span class="card-num">${i + 1}</span>
              <div class="jp-text">${highlightText(p.jp, query)}</div>
              <div class="pron-text">${highlightText(p.pron, query)}</div>
              <div class="kr-text">${highlightText(p.kr, query)}</div>
              <button class="copy-btn" title="복사" aria-label="일본어 복사"><i class="fas fa-copy"></i></button>
            </div>
          `).join('')}
        </div>
      </section>
    `;
  }).join('');

  container.querySelectorAll('.phrase-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.copy-btn')) {
        copyToClipboard(card.dataset.jp);
        showToast('클립보드에 복사되었습니다');
        return;
      }
      copyToClipboard(card.dataset.jp);
      showToast('일본어 문장이 복사되었습니다');
    });
  });
}

async function copyToClipboard(text) {
  try { await navigator.clipboard.writeText(text); }
  catch {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  }
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  toast.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => toast.classList.remove('show'), 2000);
}

function createSakura() {
  const container = document.getElementById('sakuraContainer');
  const count = Math.min(25, Math.floor(window.innerWidth / 60));
  for (let i = 0; i < count; i++) {
    const petal = document.createElement('div');
    petal.className = 'sakura';
    petal.style.left = Math.random() * 100 + '%';
    petal.style.animationDuration = (8 + Math.random() * 12) + 's';
    petal.style.animationDelay = (Math.random() * 15) + 's';
    petal.style.width = (8 + Math.random() * 10) + 'px';
    petal.style.height = (8 + Math.random() * 10) + 'px';
    container.appendChild(petal);
  }
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value.trim();
  if (searchQuery) {
    const totalResults = categories.reduce((sum, cat) =>
      sum + cat.phrases.filter(p =>
        p.jp.toLowerCase().includes(searchQuery.toLowerCase()) ||
        p.kr.toLowerCase().includes(searchQuery.toLowerCase()) ||
        p.pron.toLowerCase().includes(searchQuery.toLowerCase())
      ).length, 0);
    document.getElementById('searchCount').textContent = `검색 결과: ${totalResults}개 표현`;
  } else {
    document.getElementById('searchCount').textContent = '';
  }
  renderSections();
});

const scrollTopBtn = document.getElementById('scrollTopBtn');
window.addEventListener('scroll', () => {
  scrollTopBtn.classList.toggle('visible', window.scrollY > 400);
});
scrollTopBtn.addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

document.addEventListener('DOMContentLoaded', () => {
  createSakura();
  renderTabs();
  renderSections();
  animateCounter(document.getElementById('statTotal'), totalCount);
});
